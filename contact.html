<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Al-Islah Residential College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div id="header"></div>

  <section class="page-hero" id="hero-contact">
    <div class="hero-content" style="text-align:center; color:white;">
      <h1 class="hero-h1" style="color:white;">Get In Touch</h1>
    </div>
  </section>

  <section style="padding:120px 5vw; background:var(--cream);">
    <div class="contact-layout">
      <div class="contact-info reveal-left">
        <h2 class="section-title">We'd Love to Hear From You</h2>
        <div class="contact-detail">
          <div class="contact-item">
            <div class="contact-item-label">Visit Us</div>
            <div class="contact-item-val">No. 45, Bannerghatta Main Road,<br>Electronic City Phase 2,<br>Bengaluru, Karnataka 560100</div>
          </div>
          <div class="contact-item">
            <div class="contact-item-label">Call Us</div>
            <div class="contact-item-val"><a href="tel:+919876543210">+91 98765 43210</a></div>
          </div>
          <div class="contact-item">
            <div class="contact-item-label">Email</div>
            <div class="contact-item-val"><a href="mailto:info@alislah.edu.in">info@alislah.edu.in</a></div>
          </div>
        </div>
      </div>

      <div class="contact-form-wrap reveal-right" style="background:var(--forest); color:white;">
        <div class="form-title" style="color:white;">Send Message</div>
        <form onsubmit="event.preventDefault(); alert('Message Sent Successfully!');">
          <div class="form-grid">
            <div class="form-field"><label>Your Name</label><input type="text" required></div>
            <div class="form-field"><label>Phone</label><input type="tel"></div>
            <div class="form-field full"><label>Email</label><input type="email" required></div>
            <div class="form-field full"><label>Message</label><textarea required></textarea></div>
            <div class="form-field full"><button type="submit" class="contact-submit">Send Message</button></div>
          </div>
        </form>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
