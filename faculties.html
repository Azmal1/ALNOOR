<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facilities | Al-Islah Residential College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .page-hero { height: 70vh; background: linear-gradient(rgba(7,26,15,0.8), rgba(7,26,15,0.9)), url('https://picsum.photos/id/866/2000/1200') center/cover; }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div id="header"></div>

  <section class="page-hero">
    <div class="hero-content" style="text-align:center; color:white;">
      <h1 class="hero-h1" style="color:white;">World-Class Facilities</h1>
    </div>
  </section>

  <section style="padding:120px 5vw; background:var(--forest); color:white;">
    <div class="facilities-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-mosque"></i></div><div class="facility-name">Grand Prayer Hall</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-book"></i></div><div class="facility-name">Central Library</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-bed"></i></div><div class="facility-name">Separate Hostels</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-chalkboard-user"></i></div><div class="facility-name">Smart Classrooms</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-basketball"></i></div><div class="facility-name">Sports Ground</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-utensils"></i></div><div class="facility-name">Hygienic Mess</div></div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
