<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facilities | Al-Islah Residential College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* =========================
       HERO BANNER
    ========================== */

    .page-hero{
      position:relative;
      height:42vh;
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;

      background:
      linear-gradient(rgba(0,0,0,0.58), rgba(0,0,0,0.62)),
      url("img/camimg.jpeg") center center/cover no-repeat;
    }

    .page-hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
      radial-gradient(circle at top right,
      rgba(212,175,55,0.25),
      transparent 35%);
    }

    .hero-content{
      position:relative;
      z-index:2;
      text-align:center;
      color:white;
      width:90%;
      max-width:850px;
    }

    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 22px;
      border-radius:50px;
      margin-bottom:18px;

      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(10px);

      font-size:13px;
      letter-spacing:1px;
      color:#fff;
    }

    .hero-badge-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--gold);
    }

    .hero-h1{
      font-size:4rem;
      line-height:1.1;
      font-family:'Cormorant Garamond',serif;
      margin-bottom:16px;
      color:white;
    }

    .hero-content p{
      font-size:1rem;
      line-height:1.8;
      color:#e5e5e5;
      max-width:700px;
      margin:auto;
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div id="header"></div>

   <!-- HERO -->

  <section class="page-hero">

    <div class="hero-content">

      <div class="hero-badge">
        <span class="hero-badge-dot"></span>
        College Updates & Programs
      </div>

      <h1 class="hero-h1">
        Notices & Upcoming Events
      </h1>

      <p>
        Stay informed with the latest announcements, Islamic programs,
        academic events, student activities, and campus celebrations.
      </p>

    </div>

  </section>

  <section style="padding:120px 5vw; background:var(--forest); color:white;">
    <div class="facilities-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-mosque"></i></div><div class="facility-name">Grand Prayer Hall</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-book"></i></div><div class="facility-name">Central Library</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-bed"></i></div><div class="facility-name">Separate Hostels</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-chalkboard-user"></i></div><div class="facility-name">Smart Classrooms</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-basketball"></i></div><div class="facility-name">Sports Ground</div></div>
      <div class="facility-card"><div class="facility-icon"><i class="fa-solid fa-utensils"></i></div><div class="facility-name">Hygienic Mess</div></div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
