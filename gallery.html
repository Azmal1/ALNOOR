<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Al-Islah Residential College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .page-hero { height: 75vh; background: linear-gradient(rgba(7,26,15,0.75), rgba(7,26,15,0.85)), url('https://picsum.photos/id/133/2000/1200') center/cover; }
    .gallery-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div id="header"></div>

  <section class="page-hero">
    <div class="hero-content" style="text-align:center; color:white;">
      <h1 class="hero-h1" style="color:white;">Campus Life Gallery</h1>
    </div>
  </section>

  <section style="padding:120px 5vw; background:var(--cream);">
    <div class="gallery-grid">
      <div class="gallery-item"><img src="https://picsum.photos/id/201/800/600" alt=""></div>
      <div class="gallery-item"><img src="https://picsum.photos/id/237/800/600" alt=""></div>
      <div class="gallery-item"><img src="https://picsum.photos/id/1015/800/600" alt=""></div>
      <div class="gallery-item"><img src="https://picsum.photos/id/870/800/600" alt=""></div>
      <div class="gallery-item"><img src="https://picsum.photos/id/133/800/600" alt=""></div>
      <div class="gallery-item"><img src="https://picsum.photos/id/180/800/600" alt=""></div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
